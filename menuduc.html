<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Slide</title>

<style>
body {
  margin: 0;
  background: #161f28;
  overflow: hidden;
}

/* khung slider */
.slider {
  display: flex;
  width: 100vw;
  height: 100vh;
  transition: transform 0.4s ease;
}

/* mỗi trang */
.slide {
  min-width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* hint */
.hint {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  opacity: 0.6;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="slider" id="slider"></div>

<script>
const images = [
  "menuduc/1.png","menuduc/2.png","menuduc/3.png","menuduc/4.png","menuduc/5.png",
  "menuduc/6.png","menuduc/7.png","menuduc/8.png","menuduc/9.png","menuduc/10.png"
];

const slider = document.getElementById("slider");

let current = 0;

// tạo slide
images.forEach(src => {
  const div = document.createElement("div");
  div.className = "slide";

  const img = document.createElement("img");
  img.src = src;

  div.appendChild(img);
  slider.appendChild(div);
});

// cập nhật vị trí
function updateSlide() {
  slider.style.transform = `translateX(-${current * 100}vw)`;
}

// swipe
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  // vuốt trái → next
  if (startX - endX > 50 && current < images.length - 1) {
    current++;
    updateSlide();
  }

  // vuốt phải → prev
  if (endX - startX > 50 && current > 0) {
    current--;
    updateSlide();
  }
});

// click cũng chuyển
document.addEventListener("click", (e) => {
  const screenWidth = window.innerWidth;

  // click bên phải → next
  if (e.clientX > screenWidth / 2) {
    if (current < images.length - 1) {
      current++;
      updateSlide();
    }
  } 
  // click bên trái → prev
  else {
    if (current > 0) {
      current--;
      updateSlide();
    }
  }
});
</script>

</body>
</html>
